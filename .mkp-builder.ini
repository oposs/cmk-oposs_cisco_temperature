[package]
# Package Information
name = oposs_cisco_temperature
title = OPOSS Cisco Temperature & DOM
author = Tobias Oetiker <tobi@oetiker.ch>
description = Enhanced Cisco temperature and DOM (Digital Optical Monitoring) check.

    Provides improved sensor descriptions (combining entPhysicalDescr and
    entPhysicalName) and adds DOM monitoring for optical transceiver power
    levels (dBm/watts) with device-provided thresholds.

# CheckMK Compatibility
version.min_required = 2.3.0p1
version.packaged = 2.3.0p34

# Optional
download_url = https://github.com/oposs/cmk-oposs_cisco_temperature
version.usable_until =

# Build Options
validate_python = true
